<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minute Forecast Pro + Analytics</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #0b1e2d 0%, #162a3d 100%);
            background-attachment: fixed;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        #controls, #current, #forecast-stats {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            margin: 10px auto;
            max-width: 500px;
            padding: 20px;
        }

        #controls input {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #4fc3f7;
            background: #000;
            color: white;
            width: 90px;
        }

        #controls button {
            padding: 8px 15px;
            border-radius: 6px;
            background: #4fc3f7;
            font-weight: bold;
            cursor: pointer;
        }

        #stationName { color: #4fc3f7; font-size: 0.8em; text-transform: uppercase; margin-bottom: 10px; }
        
        /* Square NWS Icon */
        #weatherIcon { width: 100px; height: 100px; border-radius: 4px; margin-bottom: 10px; }

        /* The Legend / Key */
        .legend {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 0.8em;
            margin-top: 10px;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .dot { width: 10px; height: 10px; border-radius: 2px; }

        /* Graph Styling */
        #timeline {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 180px;
            margin: 20px auto;
            gap: 2px;
        }
        .bar {
            width: 6px;
            border-top-left-radius: 2px;
            border-top-right-radius: 2px;
            transition: height 0.5s ease;
        }

        .stat-val { font-size: 1.5em; font-weight: bold; color: #4fc3f7; }
    </style>
</head>
<body>

    <div id="controls">
        <input type="number" id="latInput" value="41.8781" step="0.01">
        <input type="number" id="lonInput" value="-87.6298" step="0.01">
        <button onclick="updateLocation()">Update</button>
    </div>

    <div id="current">
        <div id="stationName">Locating Station...</div>
        <img id="weatherIcon" src="" style="display:none;">
        <div id="conditionText">Loading...</div>
        
        <div class="legend">
            <div class="legend-item"><div class="dot" style="background:#4fc3f7"></div> Light</div>
            <div class="legend-item"><div class="dot" style="background:#ffd54f"></div> Moderate</div>
            <div class="legend-item"><div class="dot" style="background:#ff5252"></div> Heavy</div>
        </div>
    </div>

    <div id="forecast-stats">
        <div>Next 24hr Precip Total</div>
        <div class="stat-val" id="precipTotal">0.00"</div>
        <div id="summary" style="margin-top:10px; font-size: 0.9em;">-</div>
    </div>

    <div id="timeline"></div>

    <script>
        const API_KEY = "p1eTDIbrnfGjCJlwMahUzarQNqzNPyxI";
        let lat = 41.8781, lon = -87.6298;

        async function updateLocation() {
            lat = document.getElementById('latInput').value;
            lon = document.getElementById('lonInput').value;
            init();
        }

        async function loadNWS() {
            try {
                const p = await (await fetch(`https://api.weather.gov/points/${lat},${lon}`)).json();
                const s = await (await fetch(p.properties.observationStations)).json();
                const station = s.features[0];
                document.getElementById('stationName').innerText = "Conditions at " + station.properties.name;
                
                const o = await (await fetch(`https://api.weather.gov/stations/${station.properties.stationIdentifier}/observations/latest`)).json();
                document.getElementById('conditionText').innerText = o.properties.textDescription;
                document.getElementById('weatherIcon').src = o.properties.icon;
                document.getElementById('weatherIcon').style.display = 'inline-block';
            } catch (e) { document.getElementById('stationName').innerText = "NWS Offline"; }
        }

        async function loadPirate() {
            try {
                const res = await fetch(`https://api.pirateweather.net/forecast/${API_KEY}/${lat},${lon}?units=us`);
                const data = await res.json();
                
                // 1. Handle Minute Bars
                const container = document.getElementById('timeline');
                container.innerHTML = "";
                document.getElementById('summary').innerText = data.minutely.summary;

                data.minutely.data.forEach(m => {
                    const bar = document.createElement('div');
                    bar.className = 'bar';
                    bar.style.height = Math.max((m.precipIntensity || 0) * 500, 4) + "px";
                    
                    const p = m.precipProbability;
                    if (p > 0.7) bar.style.background = "#ff5252";
                    else if (p > 0.3) bar.style.background = "#ffd54f";
                    else bar.style.background = "#4fc3f7";
                    
                    container.appendChild(bar);
                });

                // 2. Calculate 24-hour total from Hourly data
                let total = 0;
                // Grab the first 24 entries of the hourly array
                data.hourly.data.slice(0, 24).forEach(hour => {
                    total += (hour.precipIntensity || 0);
                });
                document.getElementById('precipTotal').innerText = total.toFixed(2) + '"';

            } catch (e) { console.error(e); }
        }

        function init() { loadNWS(); loadPirate(); }
        window.onload = init;
    </script>
</body>
</html>
