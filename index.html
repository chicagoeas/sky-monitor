<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minute Forecast Pro</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Cool Atmospheric Gradient */
            background: linear-gradient(180deg, #0b1e2d 0%, #162a3d 100%);
            background-attachment: fixed;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        h1 { font-size: 2.2em; margin-bottom: 20px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }

        /* Glassmorphism UI */
        #controls, #current {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        #controls {
            padding: 15px;
            display: inline-block;
            margin-bottom: 30px;
        }

        #controls input {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: 1px solid rgba(79, 195, 247, 0.5);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            width: 110px;
            outline: none;
        }

        #controls button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: #4fc3f7;
            color: #0b1e2d;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #controls button:hover {
            background: #ffffff;
            transform: translateY(-2px);
        }

        #current {
            margin: 0 auto 30px auto;
            padding: 25px;
            max-width: 450px;
        }

        #stationName {
            font-size: 0.9em;
            color: #4fc3f7;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* Square NWS Icons as requested */
        #weatherIcon {
            width: 120px;
            height: 120px;
            border-radius: 8px; /* Slight roundness but definitely square */
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #conditionText { 
            font-size: 1.5em; 
            font-weight: 300;
        }

        #summary {
            font-size: 1.2em;
            margin: 20px auto;
            max-width: 600px;
            opacity: 0.9;
        }

        #timeline {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 200px;
            margin-top: 40px;
            gap: 2px;
            padding-bottom: 20px;
        }

        .bar {
            width: 6px;
            border-top-left-radius: 3px;
            border-top-right-radius: 3px;
            transition: height 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* Neon Glow Effect */
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <h1>Minute-by-Minute</h1>

    <div id="controls">
        <input type="number" id="latInput" value="41.8781" step="0.0001">
        <input type="number" id="lonInput" value="-87.6298" step="0.0001">
        <button onclick="updateLocation()">Update Location</button>
    </div>

    <div id="current">
        <div id="stationName">Loading Station...</div>
        <img id="weatherIcon" src="" alt="" style="display:none;">
        <div id="conditionText">Checking sky...</div>
    </div>

    <div id="summary">Gathering forecast data...</div>
    <div id="timeline"></div>

    <script>
        const API_KEY = "p1eTDIbrnfGjCJlwMahUzarQNqzNPyxI";
        let lat = 41.8781;
        let lon = -87.6298;

        async function updateLocation() {
            lat = parseFloat(document.getElementById('latInput').value);
            lon = parseFloat(document.getElementById('lonInput').value);
            
            document.getElementById('summary').innerText = "Updating...";
            document.getElementById('stationName').innerText = "Locating...";
            
            loadNWS();
            loadPirate();
        }

        async function loadNWS() {
            try {
                // 1. Get Metadata
                const pRes = await fetch(`https://api.weather.gov/points/${lat},${lon}`);
                const pData = await pRes.json();
                
                // 2. Get Station List
                const sRes = await fetch(pData.properties.observationStations);
                const sData = await sRes.json();
                const station = sData.features[0];
                const stationId = station.properties.stationIdentifier;
                
                // --- NEW: Set Airport Name ---
                document.getElementById('stationName').innerText = "Current Conditions at " + station.properties.name;

                // 3. Get Latest Obs
                const oRes = await fetch(`https://api.weather.gov/stations/${stationId}/observations/latest`);
                const oData = await oRes.json();
                const props = oData.properties;

                document.getElementById('conditionText').innerText = props.textDescription || "Fair";
                if (props.icon) {
                    const img = document.getElementById('weatherIcon');
                    img.src = props.icon;
                    img.style.display = 'inline-block';
                }
            } catch (err) {
                console.error(err);
                document.getElementById('stationName').innerText = "Station Unavailable";
            }
        }

        async function loadPirate() {
            try {
                const res = await fetch(`https://api.pirateweather.net/forecast/${API_KEY}/${lat},${lon}?units=us`);
                const data = await res.json();
                renderBars(data);
            } catch (err) {
                document.getElementById('summary').innerText = "Forecast currently unavailable.";
            }
        }

        function renderBars(data) {
            const minutely = data.minutely;
            const container = document.getElementById('timeline');
            container.innerHTML = "";

            if (!minutely) {
                document.getElementById('summary').innerText = "No minute-by-minute data available.";
                return;
            }

            document.getElementById('summary').innerText = minutely.summary;

            minutely.data.forEach(minute => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                
                const intensity = minute.precipIntensity || 0;
                const height = Math.max(intensity * 450, 4); 
                bar.style.height = `${height}px`;

                const prob = minute.precipProbability || 0;
                if (prob > 0.7) {
                    bar.style.background = "#ff5252";
                    bar.style.boxShadow = "0 0 12px rgba(255, 82, 82, 0.4)";
                } else if (prob > 0.3) {
                    bar.style.background = "#ffd54f";
                    bar.style.boxShadow = "0 0 12px rgba(255, 213, 79, 0.4)";
                } else {
                    bar.style.background = "#4fc3f7";
                    bar.style.boxShadow = "0 0 12px rgba(79, 195, 247, 0.4)";
                }

                container.appendChild(bar);
            });
        }

        window.onload = () => {
            loadNWS();
            loadPirate();
        };
    </script>
</body>
</html>
