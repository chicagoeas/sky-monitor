<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minute Forecast - Precision View</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b1e2d;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 { margin-bottom: 5px; font-weight: 300; font-size: 1.8em; }
        h5 { margin-top: 0; opacity: 0.6; font-weight: 400; margin-bottom: 20px; }

        /* Updated Coordinates Panel with Find Me button */
        #coords-panel {
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.03);
            display: inline-block;
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #coords-panel input {
            background: none;
            border: none;
            border-bottom: 1px solid #4fc3f7;
            color: white;
            padding: 5px;
            width: 80px;
            margin: 0 5px;
            text-align: center;
            outline: none;
        }

        .btn {
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-left: 5px;
        }

        .btn-update { background: #4fc3f7; color: #0b1e2d; }
        .btn-update:hover { background: white; }
        
        .btn-locate { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-locate:hover { background: rgba(255,255,255,0.2); }

        #dashboard {
            max-width: 700px;
            margin: auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stats-row { display: flex; justify-content: space-around; margin: 20px 0; }
        .stat-box { flex: 1; }
        .stat-label { font-size: 0.75em; opacity: 0.7; margin-bottom: 5px; text-transform: uppercase; }
        .stat-number { font-size: 1.8em; color: #4fc3f7; font-weight: bold; }

        .chart-frame { display: flex; height: 250px; margin-top: 20px; position: relative; }
        .y-axis {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding-right: 10px;
            font-size: 0.7em;
            color: #888;
            text-align: right;
            width: 45px;
        }

        #timeline { flex-grow: 1; display: flex; align-items: flex-end; gap: 2px; border-bottom: 2px solid #444; border-left: 2px solid #444; }
        .bar { flex: 1; border-radius: 1px 1px 0 0; transition: height 0.5s ease; }

        .x-axis { display: flex; margin-left: 57px; justify-content: space-between; margin-top: 10px; font-size: 0.8em; color: #4fc3f7; opacity: 0.8; }
        .legend { display: flex; justify-content: center; gap: 20px; margin-top: 30px; font-size: 0.8em; }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .box { width: 12px; height: 12px; border-radius: 2px; }

        #weatherIcon { width: 70px; height: 70px; border-radius: 8px; margin-bottom: 10px; }
        #stationName { color: #888; font-size: 0.7em; letter-spacing: 1.5px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <h1>Local Minute-by-Minute Precipitation Forecast</h1>
    <h5>Powered by Dark Sky data.</h5>

    <div id="coords-panel">
        Lat: <input type="number" id="latInput" value="41.8781" step="0.0001">
        Lon: <input type="number" id="lonInput" value="-87.6298" step="0.0001">
        <button class="btn btn-update" onclick="updateLocation()">Update</button>
        <button class="btn btn-locate" onclick="getLocation()">📍 Find Me</button>
    </div>

<div id="dashboard">
    <div id="stationName">STATION SEARCHING...</div>
    <img id="weatherIcon" src="" style="display:none;">
    <div id="conditionText">Updating Sky...</div>

    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 25px 0;">

    <div class="stats-row">
        <div class="stat-box">
            <div class="stat-label">Next 60 Min Total</div>
            <div id="oneHourTotal" class="stat-number">0.00"</div>
        </div>
        <div class="stat-box" style="border-left: 1px solid rgba(255,255,255,0.1);">
            <div class="stat-label">Next 24 Hour Total</div>
            <div id="twentyFourHourTotal" class="stat-number">0.00"</div>
        </div>
    </div>

    <div id="summary" style="font-weight: 300; margin-bottom: 10px; font-size: 0.9em;">Calculating...</div>

    <div class="chart-frame">
        <div class="y-axis">
            <div>Heavy</div>
            <div>Mod</div>
            <div>Light</div>
            <div>Trace</div>
        </div>
        <div id="timeline"></div>
    </div>
    
    <div class="x-axis">
        <span>NOW</span>
        <span>15m</span>
        <span>30m</span>
        <span>45m</span>
        <span>60m</span>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="box" style="background:#4fc3f7"></div> Light</div>
        <div class="legend-item"><div class="box" style="background:#ffd54f"></div> Moderate</div>
        <div class="legend-item"><div class="box" style="background:#ff5252"></div> Heavy</div>
    </div>
</div>

<script>
    const API_KEY = "p1eTDIbrnfGjCJlwMahUzarQNqzNPyxI";
    let lat = 41.8781;
    let lon = -87.6298;

    // --- GEOLOCATION LOGIC ---
    function getLocation() {
        if (navigator.geolocation) {
            document.getElementById('summary').innerText = "Requesting GPS access...";
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    document.getElementById('latInput').value = position.coords.latitude.toFixed(4);
                    document.getElementById('lonInput').value = position.coords.longitude.toFixed(4);
                    updateLocation();
                },
                (error) => {
                    alert("Unable to retrieve your location. Check your browser permissions.");
                    document.getElementById('summary').innerText = "Location access denied.";
                }
            );
        } else {
            alert("Geolocation is not supported by your browser.");
        }
    }

    async function updateLocation() {
        lat = parseFloat(document.getElementById('latInput').value);
        lon = parseFloat(document.getElementById('lonInput').value);
        loadAll();
    }

    async function loadAll() {
        try {
            const p = await (await fetch(`https://api.weather.gov/points/${lat},${lon}`)).json();
            const s = await (await fetch(p.properties.observationStations)).json();
            const station = s.features[0];
            document.getElementById('stationName').innerText = "AT " + station.properties.name.toUpperCase();
            
            const o = await (await fetch(`https://api.weather.gov/stations/${station.properties.stationIdentifier}/observations/latest`)).json();
            document.getElementById('conditionText').innerText = o.properties.textDescription;
            document.getElementById('weatherIcon').src = o.properties.icon;
            document.getElementById('weatherIcon').style.display = 'inline-block';

            const res = await fetch(`https://api.pirateweather.net/forecast/${API_KEY}/${lat},${lon}?units=us`);
            const data = await res.json();
            
            let total24 = 0;
            data.hourly.data.slice(0, 24).forEach(h => total24 += (h.precipIntensity || 0));
            document.getElementById('twentyFourHourTotal').innerText = total24.toFixed(2) + '"';

            let total1 = 0;
            const container = document.getElementById('timeline');
            container.innerHTML = "";
            document.getElementById('summary').innerText = data.minutely.summary;

            data.minutely.data.forEach(m => {
                const intensity = m.precipIntensity || 0;
                total1 += (intensity / 60);
                const bar = document.createElement('div');
                bar.className = 'bar';
                const h = Math.min(intensity * 600, 240); 
                bar.style.height = Math.max(h, 2) + "px";
                if (intensity > 0.3) bar.style.background = "#ff5252";
                else if (intensity > 0.1) bar.style.background = "#ffd54f";
                else if (intensity > 0) bar.style.background = "#4fc3f7";
                else bar.style.background = "rgba(255,255,255,0.1)";
                container.appendChild(bar);
            });
            document.getElementById('oneHourTotal').innerText = total1.toFixed(2) + '"';
        } catch (e) { console.error(e); }
    }

    window.onload = loadAll;
</script>
</body>
</html>
