<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minute Forecast</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0b1e2d;
    color: white;
    text-align: center;
    padding: 40px;
}

h1 {
    font-size: 2.5em;
}

#summary {
    font-size: 1.5em;
    margin: 20px 0;
}

#current {
    margin-top: 20px;
    padding: 15px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
}

#current img {
    width: 120px;
    height: auto;
}

#timeline {
    display: flex;
    justify-content: center;
    margin-top: 30px;
}

.bar {
    width: 4px;
    margin: 0 1px;
    background: #4fc3f7;
}
</style>

</head>

<body>

<h1>Minute-by-Minute Forecast</h1>

<div id="summary">Loading...</div>

<div id="current">
    <h2>Current Conditions</h2>
    <img id="weatherIcon" />
    <div id="conditionText"></div>
</div>

<div id="timeline"></div>

<script>

const API_KEY = "YOUR_PIRATE_WEATHER_KEY";

// Chicago
const lat = 41.8781;
const lon = -87.6298;

let cachedData = null;
let lastFetchTime = 0;
const CACHE_TIME = 120000;

// ---------------------------
// ICON MAPPING FUNCTION
// ---------------------------
function getIcon(condition, isDaytime = true) {
    const c = condition.toLowerCase();

    const DAY = true;

    // Thunderstorm
    if (c.includes("thunderstorm")) {
        return isDaytime
            ? "https://www.weather.gov/images/nws/newicons/tsra.png"
            : "https://www.weather.gov/images/nws/newicons/ntsra.png";
    }

    // Heavy rain
    if (c.includes("heavy rain")) {
        return isDaytime
            ? "https://www.weather.gov/images/nws/newicons/ra.png"
            : "https://www.weather.gov/images/nws/newicons/nra.png";
    }

    // Rain (general)
    if (c.includes("rain")) {
        return isDaytime
            ? "https://www.weather.gov/images/nws/newicons/ra.png"
            : "https://www.weather.gov/images/nws/newicons/nra.png";
    }

    // Drizzle / light rain variations (you had a lot of these in your system)
    if (
        c.includes("drizzle") ||
        c.includes("light rain") ||
        c.includes("light drizzle")
    ) {
        return isDaytime
            ? "https://www.weather.gov/images/nws/newicons/minus_ra.png"
            : "https://www.weather.gov/images/nws/newicons/nra.png";
    }

    // Showers (ALL shower variants you listed)
    if (c.includes("showers")) {
        return isDaytime
            ? "https://www.weather.gov/images/nws/newicons/shra.png"
            : "https://www.weather.gov/images/nws/newicons/nshra.png";
    }

    // Fog/Mist variants (you had these in your list)
    if (c.includes("fog") || c.includes("mist")) {
        return isDaytime
            ? "https://www.weather.gov/images/nws/newicons/fog.png"
            : "https://www.weather.gov/images/nws/newicons/nfg.png";
    }

    // Thunderstorm vicinity / weak storms
    if (c.includes("vicinity") && c.includes("thunderstorm")) {
        return isDaytime
            ? "https://www.weather.gov/images/nws/newicons/scttsra.png"
            : "https://www.weather.gov/images/nws/newicons/nscttsra.png";
    }

    // Default fallback
    return isDaytime
        ? "https://www.weather.gov/images/nws/newicons/bkn.png"
        : "https://www.weather.gov/images/nws/newicons/nskc.png";
}

// ---------------------------
// CURRENT CONDITIONS
// ---------------------------
async function loadCurrentConditions() {
    try {
        const res = await fetch(
            "https://api.weather.gov/stations/KORD/observations/latest"
        );
        const data = await res.json();

        const props = data.properties;

        const text = props.textDescription || "Unknown";

        document.getElementById("conditionText").innerText = text;

        const icon = getIcon(text, props.isDaytime);

        document.getElementById("weatherIcon").src = icon;

    } catch (err) {
        console.error("Current conditions error:", err);
    }
}

// ---------------------------
// PRECIP GATE (simple)
// ---------------------------
async function checkPrecipGate() {
    try {
        const res = await fetch(
            "https://api.weather.gov/stations/KORD/observations/latest"
        );
        const data = await res.json();

        const text = (data.properties.textDescription || "").toLowerCase();

        return (
            text.includes("rain") ||
            text.includes("snow") ||
            text.includes("drizzle") ||
            text.includes("shower")
        );

    } catch (err) {
        return true;
    }
}

// ---------------------------
// PIRATE WEATHER FETCH
// ---------------------------
async function fetchWeather() {
    try {
        const now = Date.now();

        if (cachedData && (now - lastFetchTime < CACHE_TIME)) {
            render(cachedData);
            return;
        }

        const response = await fetch(
            `https://api.pirateweather.net/forecast/${API_KEY}/${lat},${lon}?units=us`
        );

        const data = await response.json();

        cachedData = data;
        lastFetchTime = now;

        render(data);

    } catch (err) {
        document.getElementById("summary").innerText =
            "Error loading forecast.";
    }
}

// ---------------------------
// RENDER MINUTECast
// ---------------------------
function render(data) {
    const minutely = data.minutely;

    if (!minutely || !minutely.data || minutely.data.length === 0) {
    document.getElementById("summary").innerText =
        "No minute-by-minute precipitation data available.";
    document.getElementById("timeline").innerHTML = "";
    return;
    }

    document.getElementById("summary").innerText = minutely.summary;

    const container = document.getElementById("timeline");
    container.innerHTML = "";

    minutely.data.forEach(min => {
        const bar = document.createElement("div");
        bar.className = "bar";

        const height = Math.max(min.precipIntensity * 200, 2);
        bar.style.height = height + "px";

        if (min.precipProbability > 0.7) {
            bar.style.background = "#ff5252";
        } else if (min.precipProbability > 0.3) {
            bar.style.background = "#ffd54f";
        } else {
            bar.style.background = "#4fc3f7";
        }

        container.appendChild(bar);
    });
}

// ---------------------------
// STARTUP (Fixed Logic)
// ---------------------------
async function start() {
    // 1. Load general conditions (Icons/Text) from NWS
    loadCurrentConditions();
    setInterval(loadCurrentConditions, 300000); // Refresh every 5 mins

    // 2. Fetch the MinuteCast immediately
    // We removed the 'hasPrecip' gate so it loads even if it's currently dry
    fetchWeather();
    
    // 3. Refresh MinuteCast every 3 minutes
    setInterval(fetchWeather, 180000);
}

start();

</script>

</body>
</html>
