<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaddleWeather | Professional Station</title>
    <style>
        :root { --primary: #4fc3f7; --accent: #ffd54f; --danger: #ff1744; --warning: #ffeb3b; --success: #00e676; --bg: #07131d; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(180deg, var(--bg) 0%, #112233 100%);
            background-attachment: fixed; color: white; margin: 0; 
            padding: 20px 20px 100px 20px;
        }

        h1 { margin: 0 0 10px 0; font-weight: 800; font-size: 2.2em; color: var(--accent); letter-spacing: -1px; }

        #alert-banner {
            display: none; background: var(--danger); color: white; padding: 15px;
            border-radius: 12px; margin-bottom: 20px; font-weight: bold;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 4px 15px rgba(255, 23, 68, 0.4);
        }

        #dashboard {
            max-width: 850px; margin: auto; background: rgba(255, 255, 255, 0.03);
            padding: 30px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px); box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        #coords-panel {
            margin-bottom: 25px; background: rgba(255, 255, 255, 0.05);
            display: inline-flex; align-items: center; padding: 8px 15px; border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1); gap: 10px;
        }
        #coords-panel input {
            background: none; border: none; border-bottom: 1px solid var(--primary);
            color: white; padding: 5px; width: 80px; text-align: center; outline: none;
        }
        .btn-action { background: var(--primary); color: #07131d; border: none; padding: 6px 12px; border-radius: 15px; font-weight: bold; cursor: pointer; }
        .btn-gps { background: rgba(255,255,255,0.1); color: white; }

        .tab-content { display: none; animation: fadeIn 0.3s ease-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .detail-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 25px 0; }
        .detail-item { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .detail-label { font-size: 0.7em; opacity: 0.5; text-transform: uppercase; margin-bottom: 5px; }
        .detail-val { font-size: 1.2em; font-weight: bold; color: var(--accent); }

        .chart-frame { display: flex; height: 150px; margin-top: 15px; position: relative; overflow: hidden; }
        .y-axis { display: flex; flex-direction: column; justify-content: space-between; padding-right: 12px; font-size: 0.6em; color: #888; text-align: right; width: 45px; }
        #timeline { flex-grow: 1; display: flex; align-items: flex-end; gap: 2px; border-bottom: 1px solid #444; border-left: 1px solid #444; height: 100%; }
        .bar { flex: 1; background: rgba(255,255,255,0.05); min-height: 2px; border-radius: 1px 1px 0 0; transition: height 0.5s; }
        .x-axis { display: flex; margin-left: 60px; justify-content: space-between; margin-top: 8px; font-size: 0.7em; color: var(--primary); opacity: 0.8; }

        .forecast-scroll { display: flex; overflow-x: auto; gap: 15px; padding-bottom: 10px; scrollbar-width: thin; }
        .forecast-card { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; min-width: 110px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.05); }
        .forecast-desc { font-size: 0.65em; opacity: 0.7; text-transform: capitalize; margin-top: 4px; line-height: 1.2; }

        #alert-stack { display: flex; flex-direction: column; gap: 10px; }
        .alert-card { display: flex; align-items: center; gap: 15px; padding: 15px; border-radius: 12px; text-align: left; text-decoration: none; color: white; transition: 0.2s; }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; background: #0b1e2d;
            display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000;
        }
        .nav-item { color: #888; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 1.1em; transition: 0.3s; }
        .nav-item span { font-size: 0.5em; text-transform: uppercase; margin-top: 4px; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <h1>WaddleWeather</h1>
    
    <div id="coords-panel">
        <input type="number" id="latInput" value="41.8781" step="0.0001">
        <input type="number" id="lonInput" value="-87.6298" step="0.0001">
        <button class="btn-action" onclick="updateLocation()">SYNC</button>
        <button class="btn-action btn-gps" onclick="getLocation()">📍 GPS</button>
    </div>

<div id="dashboard">

    <div id="home-tab" class="tab-content active">
        <div id="alert-banner" onclick="switchTab('severe', document.getElementById('nav-severe'))">⚠️ ALERTS ACTIVE</div>

        <div id="stationName" style="color: #888; font-size: 0.75em; margin-bottom: 10px; letter-spacing: 1px;">INITIALIZING...</div>
        <div style="display: flex; align-items: center; justify-content: center; gap: 25px;">
            <img id="weatherIcon" src="" style="display:none; width: 80px;">
            <div id="conditionText" style="font-size: 2.5em; font-weight: 300;">--</div>
        </div>

        <div class="detail-grid">
            <div class="detail-item"><div class="detail-label">Wind</div><div id="windVal" class="detail-val">--</div></div>
            <div class="detail-item"><div class="detail-label">Humidity</div><div id="humVal" class="detail-val">--</div></div>
            <div class="detail-item"><div class="detail-label">Sunrise</div><div id="riseVal" class="detail-val">--</div></div>
            <div class="detail-item"><div class="detail-label">Sunset</div><div id="setVal" class="detail-val">--</div></div>
        </div>

        <div style="text-align:left; font-weight:bold; color:var(--primary); margin-bottom:5px;">MINUTE-PRECIP</div>
        <div id="minuteSummary" style="text-align:left; font-size: 1.1em; color: var(--accent); margin-bottom: 10px;">--</div>
        <div class="chart-frame">
            <div class="y-axis"><div>Heavy</div><div>Mod</div><div>Light</div></div>
            <div id="timeline"></div>
        </div>
        <div class="x-axis"><span>NOW</span><span>15m</span><span>30m</span><span>45m</span><span>60m</span></div>

        <div style="text-align:left; font-weight:bold; color:var(--primary); margin: 30px 0 10px 0;">3-HOURLY OUTLOOK (5 DAY)</div>
        <div class="forecast-scroll" id="forecast-container"></div>
    </div>

    <div id="severe-tab" class="tab-content">
        <div id="alert-stack" style="margin-bottom:20px;"></div>
        <iframe id="radar-frame" width="100%" height="450" frameborder="0" style="border-radius:20px; background: #000; margin-bottom:20px;"></iframe>
        <div style="text-align:left; font-weight:bold; color:var(--primary); margin-bottom:10px;">SPC DAY 1 CONVECTIVE OUTLOOK</div>
        <div style="background:#111; border-radius:15px; overflow:hidden; border: 1px solid #333;">
            <img id="spc-map" src="" referrerpolicy="no-referrer" style="width: 100%; display:block; min-height:200px;">
        </div>
    </div>

    <div id="details-tab" class="tab-content">
        <div id="wfo-label" style="text-align:left; font-size:0.7em; color:var(--primary); margin-bottom:5px;">OFFICE: --</div>
        <div class="nws-discussion" id="nws-text" style="background:rgba(0,0,0,0.4); padding:20px; border-radius:15px; text-align:left; font-family:monospace; font-size:0.85em; color:#aeea00; height:450px; overflow-y:auto; line-height:1.5;">Syncing Discussion...</div>
    </div>

</div>

<div class="bottom-nav">
    <div class="nav-item active" id="nav-home" onclick="switchTab('home', this)">🏠<span>Home</span></div>
    <div class="nav-item" id="nav-severe" onclick="switchTab('severe', this)">⚠️<span>Severe</span></div>
    <div class="nav-item" id="nav-details" onclick="switchTab('details', this)">📖<span>Dive</span></div>
</div>

<script>
    const PIRATE_API_KEY = "p1eTDIbrnfGjCJlwMahUzarQNqzNPyxI";
    const OW_API_KEY = "065942b97acab61c4f876f77d1e71cfb";
    let lat = 41.8781, lon = -87.6298;

    function switchTab(tabId, element) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(tabId + '-tab').classList.add('active');
        element.classList.add('active');
    }

    function saveLoc() { localStorage.setItem('waddle_lat', lat); localStorage.setItem('waddle_lon', lon); }
    function loadLoc() {
        const sLat = localStorage.getItem('waddle_lat');
        const sLon = localStorage.getItem('waddle_lon');
        if(sLat) { lat = sLat; lon = sLon; document.getElementById('latInput').value = lat; document.getElementById('lonInput').value = lon; }
    }

    function updateLocation() {
        lat = document.getElementById('latInput').value;
        lon = document.getElementById('lonInput').value;
        saveLoc(); loadAll();
    }

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                lat = p.coords.latitude.toFixed(4);
                lon = p.coords.longitude.toFixed(4);
                document.getElementById('latInput').value = lat;
                document.getElementById('lonInput').value = lon;
                updateLocation();
            }, e => alert("GPS Access Denied"));
        }
    }

    async function updateSPCMap() {
        const spcImg = document.getElementById('spc-map');
        // We use the timestamp (?t=...) to force the browser to get a FRESH copy
        // and not use a broken one it might have saved in its memory.
        const spcUrl = "https://www.spc.noaa.gov/products/outlook/day1otlk.png";
        spcImg.src = `${spcUrl}?t=${new Date().getTime()}`;
    }
    
    async function loadAll() {
        document.getElementById('radar-frame').src = `https://www.rainviewer.com/map.html?loc=${lat},${lon},8&oFa=0&oC=1&oU=0&oLL=0&oHu=0&oD=1&oQ=0&oTh=0&color=2&sm=1&sn=1`;
        updateSPCMap(); // <--- This is the call that fixed the map!
        fetchAlerts(); fetchPirate(); fetchOpenWeather(); fetchNWSChain();
    }

    async function fetchAlerts() {
        const stack = document.getElementById('alert-stack');
        const banner = document.getElementById('alert-banner');
        try {
            const res = await fetch(`https://api.weather.gov/alerts/active?point=${lat},${lon}`);
            const data = await res.json();
            stack.innerHTML = "";
            if (data.features?.length > 0) {
                banner.style.display = "block";
                banner.innerText = `⚠️ ${data.features[0].properties.severity.toUpperCase()} ALERT: ${data.features[0].properties.event}`;
                banner.style.background = data.features[0].properties.severity === 'Extreme' ? '#ff1744' : '#ff9100';

                data.features.forEach(f => {
                    const p = f.properties;
                    let icon = "https://forecast.weather.gov/newimages/medium/nshra.png";
                    const evt = p.event.toLowerCase();
                    if(evt.includes("tornado")) icon = "https://forecast.weather.gov/newimages/medium/tor.png";
                    else if(evt.includes("thunderstorm")) icon = "https://forecast.weather.gov/newimages/large/tsra.png";
                    else if(evt.includes("flood")) icon = "https://forecast.weather.gov/newimages/medium/ffg.png";

                    stack.innerHTML += `
                        <a href="https://forecast.weather.gov/MapClick.php?lat=${lat}&lon=${lon}" target="_blank" class="alert-card" style="background:${p.severity==='Extreme'?'#b71c1c':'#e65100'}">
                            <img src="${icon}" style="width:55px; border-radius:5px;">
                            <div><b>${p.event}</b><br><small>${p.headline || ''}</small></div>
                        </a>`;
                });
            } else { banner.style.display = "none"; stack.innerHTML = "<div style='opacity:0.5; padding:20px;'>No active hazards.</div>"; }
        } catch(e) {}
    }

    async function fetchPirate() {
        try {
            const res = await fetch(`https://api.pirateweather.net/forecast/${PIRATE_API_KEY}/${lat},${lon}?units=us`);
            const d = await res.json();
            document.getElementById('minuteSummary').innerText = d.minutely?.summary || "Conditions holding steady.";
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = "";
            d.minutely?.data.forEach(m => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                const intensity = m.precipIntensity || 0;
                let heightPct = Math.min((intensity / 0.4) * 100, 100);
                bar.style.height = Math.max(heightPct, 2) + "%";
                if (intensity > 0) {
                    if (intensity >= 0.3) bar.style.background = "#ff1744"; 
                    else if (intensity >= 0.1) bar.style.background = "#ffeb3b";
                    else bar.style.background = "#00e676";
                }
                timeline.appendChild(bar);
            });
        } catch(e) {}
    }

    async function fetchOpenWeather() {
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${OW_API_KEY}&units=imperial`);
            const d = await res.json();
            document.getElementById('riseVal').innerText = new Date(d.city.sunrise * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.getElementById('setVal').innerText = new Date(d.city.sunset * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            const cont = document.getElementById('forecast-container');
            cont.innerHTML = "";
            d.list.forEach(f => {
                cont.innerHTML += `<div class="forecast-card">
                    <div style="font-size:0.8em; color:var(--primary); font-weight:bold;">${new Date(f.dt*1000).toLocaleTimeString([], {weekday:'short', hour:'numeric'})}</div>
                    <img src="https://openweathermap.org/img/wn/${f.weather[0].icon}.png" style="width:50px;">
                    <div style="font-size:1.3em; font-weight:bold;">${Math.round(f.main.temp)}&deg;</div>
                    <div class="forecast-desc">${f.weather[0].description}</div>
                </div>`;
            });
        } catch(e) {}
    }

    async function fetchNWSChain() {
        try {
            const p = await (await fetch(`https://api.weather.gov/points/${lat},${lon}`)).json();
            const wfo = p.properties.cwa;
            document.getElementById('wfo-label').innerText = "OFFICE: " + wfo;
            const stations = await (await fetch(p.properties.observationStations)).json();
            const obs = await (await fetch(`${stations.features[0].id}/observations/latest`)).json();
            document.getElementById('stationName').innerText = stations.features[0].properties.name;
            document.getElementById('conditionText').innerText = obs.properties.textDescription || "--";
            document.getElementById('weatherIcon').src = obs.properties.icon;
            document.getElementById('weatherIcon').style.display = "block";
            document.getElementById('windVal').innerText = Math.round(obs.properties.windSpeed.value * 0.621) + " mph";
            document.getElementById('humVal').innerText = Math.round(obs.properties.relativeHumidity.value) + "%";
            const afdList = await (await fetch(`https://api.weather.gov/products/types/AFD/locations/${wfo}`)).json();
            const afd = await (await fetch(afdList['@graph'][0]['@id'])).json();
            document.getElementById('nws-text').innerText = afd.productText;
        } catch(e) {}
    }

    window.onload = () => { loadLoc(); loadAll(); };
</script>
</body>
</html>
