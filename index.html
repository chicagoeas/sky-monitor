<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minute Forecast</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b1e2d;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        h1 { font-size: 2em; margin-bottom: 10px; }

        #controls {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 20px;
        }

        #controls input {
            padding: 10px;
            margin: 5px;
            border-radius: 6px;
            border: 1px solid #29b6f6;
            background: #162a3d;
            color: white;
            width: 120px;
        }

        #controls button {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            background: #4fc3f7;
            color: #0b1e2d;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        #controls button:hover { background: #81d4fa; }

        #summary {
            font-size: 1.2em;
            margin: 20px auto;
            max-width: 600px;
            line-height: 1.4;
        }

        #current {
            margin: 20px auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            max-width: 400px;
        }

        #weatherIcon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        #conditionText { font-size: 1.3em; font-weight: bold; }

        #timeline {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 220px;
            margin-top: 30px;
            gap: 2px;
        }

        .bar {
            width: 6px;
            background: #4fc3f7;
            border-top-left-radius: 2px;
            border-top-right-radius: 2px;
            transition: height 0.5s ease;
        }
    </style>
</head>
<body>

    <h1>Local Minute-by-Minute Precipitation Forecast</h1>
    <h5>Powered by Dark Sky data.</h5>

    <div id="controls">
        <input type="number" id="latInput" value="41.8781" step="0.0001">
        <input type="number" id="lonInput" value="-87.6298" step="0.0001">
        <button onclick="updateLocation()">Update Location</button>
    </div>

    <div id="current">
        <img id="weatherIcon" src="" alt="">
        <div id="conditionText">Loading...</div>
    </div>

    <div id="summary">Initializing weather data...</div>
    <div id="timeline"></div>

    <script>
        // --- CONFIGURATION ---
        const API_KEY = "p1eTDIbrnfGjCJlwMahUzarQNqzNPyxI";
        let lat = 41.8781;
        let lon = -87.6298;

        // --- CORE FUNCTIONS ---

        async function updateLocation() {
            const newLat = parseFloat(document.getElementById('latInput').value);
            const newLon = parseFloat(document.getElementById('lonInput').value);

            if (isNaN(newLat) || isNaN(newLon)) {
                alert("Please enter valid coordinates.");
                return;
            }

            lat = newLat;
            lon = newLon;

            document.getElementById('summary').innerText = "Updating forecast...";
            document.getElementById('conditionText').innerText = "Locating station...";
            
            // Refresh both APIs
            await loadNWS();
            await loadPirate();
        }

        async function loadNWS() {
            try {
                // 1. Get metadata for coordinates
                const pointsUrl = `https://api.weather.gov/points/${lat},${lon}`;
                const pointsRes = await fetch(pointsUrl);
                if (!pointsRes.ok) throw new Error("Location outside US coverage");
                const pointsData = await pointsRes.json();

                // 2. Get the observation stations list
                const stationsUrl = pointsData.properties.observationStations;
                const stationsRes = await fetch(stationsUrl);
                const stationsData = await stationsRes.json();
                
                if (!stationsData.features?.length) throw new Error("No stations found");
                const stationId = stationsData.features[0].properties.stationIdentifier;

                // 3. Get latest observations from the closest station
                const obsUrl = `https://api.weather.gov/stations/${stationId}/observations/latest`;
                const obsRes = await fetch(obsUrl);
                const obsData = await obsRes.json();
                const props = obsData.properties;

                // Update UI
                document.getElementById('conditionText').innerText = props.textDescription || "Unknown";
                if (props.icon) {
                    document.getElementById('weatherIcon').src = props.icon;
                    document.getElementById('weatherIcon').style.display = 'inline-block';
                }
            } catch (err) {
                console.error("NWS Error:", err);
                document.getElementById('conditionText').innerText = "NWS Data Unavailable";
                document.getElementById('weatherIcon').style.display = 'none';
            }
        }

        async function loadPirate() {
            try {
                const url = `https://api.pirateweather.net/forecast/${API_KEY}/${lat},${lon}?units=us`;
                const res = await fetch(url);
                
                if (!res.ok) {
                    const errorJson = await res.json();
                    throw new Error(errorJson.message || "Pirate Weather API Error");
                }

                const data = await res.json();
                renderMinuteTimeline(data);
            } catch (err) {
                console.error("Pirate Error:", err);
                document.getElementById('summary').innerText = "Forecast Error: " + err.message;
            }
        }

        function renderMinuteTimeline(data) {
            const minutely = data.minutely;
            const container = document.getElementById('timeline');
            container.innerHTML = "";

            if (!minutely || !minutely.data) {
                document.getElementById('summary').innerText = "Minute-by-minute data not available for this area.";
                return;
            }

            document.getElementById('summary').innerText = minutely.summary || "No precipitation expected.";

            minutely.data.forEach(minute => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                
                // Scale height based on intensity
                const intensity = minute.precipIntensity || 0;
                const height = Math.max(intensity * 400, 4); // Min 4px height
                bar.style.height = `${height}px`;

                // Color based on probability
                const prob = minute.precipProbability || 0;
                if (prob > 0.7) bar.style.background = "#ff5252"; // High chance
                else if (prob > 0.3) bar.style.background = "#ffd54f"; // Moderate
                else bar.style.background = "#4fc3f7"; // Low/None

                container.appendChild(bar);
            });
        }

        // Initialize on load
        window.onload = () => {
            loadNWS();
            loadPirate();
        };
    </script>
</body>
</html>
