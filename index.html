<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minute Forecast</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0b1e2d;
    color: white;
    text-align: center;
    padding: 40px;
}

h1 {
    font-size: 2.5em;
}

#summary {
    font-size: 1.5em;
    margin: 20px 0;
}

#timeline {
    display: flex;
    justify-content: center;
    margin-top: 30px;
}

.bar {
    width: 4px;
    margin: 0 1px;
    background: #4fc3f7;
}
</style>

</head>

<body>

<h1>Minute-by-Minute Forecast</h1>

<div id="summary">Loading...</div>
<div id="timeline"></div>

<script>

const API_KEY = "YOUR_PIRATE_WEATHER_KEY";

// Chicago
const lat = 41.8781;
const lon = -87.6298;

let cachedData = null;
let lastFetchTime = 0;
const CACHE_TIME = 120000; // 2 minutes

// ------------------------------
// 1. CURRENT CONDITIONS GATE
// ------------------------------
async function checkPrecipGate() {
    try {
        const res = await fetch(
            "https://api.weather.gov/stations/KORD/observations/latest"
        );
        const data = await res.json();

        const text = (data.properties.textDescription || "").toLowerCase();

        return (
            text.includes("rain") ||
            text.includes("snow") ||
            text.includes("drizzle") ||
            text.includes("shower")
        );

    } catch (err) {
        console.error("Gate check failed:", err);
        return true; // fail-safe: allow forecast if uncertain
    }
}

// ------------------------------
// 2. PIRATE WEATHER FETCH
// ------------------------------
async function fetchWeather() {
    try {
        const now = Date.now();

        // Use cache if fresh
        if (cachedData && (now - lastFetchTime < CACHE_TIME)) {
            console.log("Using cached Pirate Weather data");
            render(cachedData);
            return;
        }

        console.log("Fetching Pirate Weather");

        const response = await fetch(
            `https://api.pirateweather.net/forecast/${API_KEY}/${lat},${lon}?units=us`
        );

        const data = await response.json();

        cachedData = data;
        lastFetchTime = now;

        render(data);

    } catch (err) {
        document.getElementById("summary").innerText = "Error loading data.";
        console.error(err);
    }
}

// ------------------------------
// 3. RENDER FUNCTION
// ------------------------------
function render(data) {
    const minutely = data.minutely;

    if (!minutely) {
        document.getElementById("summary").innerText =
            "No minute data available.";
        return;
    }

    document.getElementById("summary").innerText = minutely.summary;

    const container = document.getElementById("timeline");
    container.innerHTML = "";

    minutely.data.forEach(min => {
        const bar = document.createElement("div");
        bar.className = "bar";

        const height = Math.max(min.precipIntensity * 200, 2);
        bar.style.height = height + "px";

        if (min.precipProbability > 0.7) {
            bar.style.background = "#ff5252";
        } else if (min.precipProbability > 0.3) {
            bar.style.background = "#ffd54f";
        } else {
            bar.style.background = "#4fc3f7";
        }

        container.appendChild(bar);
    });
}

// ------------------------------
// 4. STARTUP LOGIC (THE GATE)
// ------------------------------
async function start() {
    const hasPrecip = await checkPrecipGate();

    if (!hasPrecip) {
        document.getElementById("summary").innerText =
            "No precipitation expected at the moment.";

        document.getElementById("timeline").innerHTML = "";
        return;
    }

    fetchWeather();
    setInterval(fetchWeather, 180000); // every 3 min
}

start();

</script>

</body>
</html>
