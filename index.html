<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Weather Hub v1.0</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #0b1e2d 0%, #1a2a3a 100%);
            background-attachment: fixed;
            color: white; text-align: center; margin: 0; padding: 20px;
        }

        /* Alerts Banner */
        #alerts-banner {
            background: #ff5252; color: white; padding: 15px; margin: 0 auto 20px auto;
            border-radius: 10px; font-weight: bold; max-width: 700px; display: none;
            box-shadow: 0 4px 15px rgba(255, 82, 82, 0.4); animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* Controls */
        #coords-panel {
            margin-bottom: 25px; background: rgba(255, 255, 255, 0.05);
            display: inline-block; padding: 10px 20px; border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
        }
        #coords-panel input {
            background: none; border: none; border-bottom: 1px solid #4fc3f7;
            color: white; padding: 5px; width: 75px; margin: 0 5px; text-align: center; outline: none;
        }
        .btn {
            border: none; padding: 6px 16px; border-radius: 20px; font-weight: bold;
            cursor: pointer; transition: 0.2s; margin-left: 5px;
        }
        .btn-update { background: #4fc3f7; color: #0b1e2d; }
        .btn-locate { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }

        #dashboard {
            max-width: 750px; margin: auto; background: rgba(255, 255, 255, 0.05);
            padding: 25px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .section-divider { border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 25px 0; }
        .section-title { font-size: 1.1em; font-weight: 300; margin-bottom: 15px; color: #4fc3f7; text-transform: uppercase; letter-spacing: 1px; }

        /* Detail Grid */
        .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 15px; margin: 20px 0; }
        .detail-item { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .detail-label { font-size: 0.7em; opacity: 0.6; margin-bottom: 4px; }
        .detail-val { font-size: 1.1em; font-weight: bold; color: #ffd54f; }

        /* 60m Chart */
        .chart-frame { display: flex; height: 180px; margin-top: 15px; position: relative; }
        .y-axis { display: flex; flex-direction: column; justify-content: space-between; padding-right: 10px; font-size: 0.6em; color: #888; text-align: right; width: 45px; }
        #timeline { flex-grow: 1; display: flex; align-items: flex-end; gap: 2px; border-bottom: 2px solid #444; border-left: 2px solid #444; }
        .bar { flex: 1; border-radius: 1px 1px 0 0; }
        .x-axis { display: flex; margin-left: 57px; justify-content: space-between; margin-top: 8px; font-size: 0.7em; color: #4fc3f7; }

        /* Forecast Scroll */
        .forecast-scroll { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 10px; }
        .forecast-card {
            background: rgba(0,0,0,0.3); padding: 12px; border-radius: 12px;
            min-width: 85px; text-align: center; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.05);
        }
        .ow-icon { width: 40px; height: 40px; }
        .ow-temp { font-size: 1.2em; font-weight: bold; }

        /* Tools Bar */
        .tools-bar { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .tool-link { font-size: 0.75em; color: #4fc3f7; text-decoration: none; border: 1px solid #4fc3f7; padding: 4px 10px; border-radius: 5px; opacity: 0.8; }
        .tool-link:hover { background: #4fc3f7; color: #0b1e2d; opacity: 1; }
    </style>
</head>
<body>

    <div id="alerts-banner"></div>

    <h1>The Weather Hub</h1>
    <h5>Precision Weather Watcher v1.0</h5>

    <div id="coords-panel">
        Lat: <input type="number" id="latInput" value="41.8781" step="0.0001">
        Lon: <input type="number" id="lonInput" value="-87.6298" step="0.0001">
        <button class="btn btn-update" onclick="updateLocation()">Update</button>
        <button class="btn btn-locate" onclick="getLocation()">📍 Find Me</button>
    </div>

<div id="dashboard">
    <div id="stationName">SYNCING DATA...</div>
    <div style="display: flex; align-items: center; justify-content: center; gap: 20px;">
        <img id="weatherIcon" src="" style="display:none; width: 70px;">
        <div id="conditionText" style="font-size: 1.8em; font-weight: 300;">--</div>
    </div>

    <div class="detail-grid">
        <div class="detail-item"><div class="detail-label">Wind</div><div id="windVal" class="detail-val">--</div></div>
        <div class="detail-item"><div class="detail-label">Humidity</div><div id="humVal" class="detail-val">--</div></div>
        <div class="detail-item"><div class="detail-label">Sunrise</div><div id="riseVal" class="detail-val">--</div></div>
        <div class="detail-item"><div class="detail-label">Sunset</div><div id="setVal" class="detail-val">--</div></div>
    </div>

    <hr class="section-divider">

    <div class="section-title">Minute-Cast</div>
    <div style="display: flex; justify-content: space-around; margin-bottom: 10px;">
        <div><small>60M TOTAL:</small> <span id="oneHourTotal" style="color:#4fc3f7; font-weight:bold;">0.00"</span></div>
        <div><small>24H TOTAL:</small> <span id="twentyFourHourTotal" style="color:#4fc3f7; font-weight:bold;">0.00"</span></div>
    </div>
    <div id="summary" style="font-size: 0.85em; opacity: 0.8; margin-bottom: 10px;">--</div>
    
    <div class="chart-frame">
        <div class="y-axis"><div>Hvy</div><div>Mod</div><div>Lt</div><div>Tr</div></div>
        <div id="timeline"></div>
    </div>
    <div class="x-axis"><span>NOW</span><span>15m</span><span>30m</span><span>45m</span><span>60m</span></div>

    <hr class="section-divider">

    <div class="section-title">5-Day Outlook</div>
    <div class="forecast-scroll" id="forecast-container"></div>

    <hr class="section-divider">

    <div class="section-title">Live Doppler Radar</div>
    <iframe id="radar-frame" width="100%" height="350" frameborder="0" style="border-radius:15px; background: #000;"></iframe>

    <div class="tools-bar">
        <a id="blitzLink" href="#" target="_blank" class="tool-link">⚡ Live Lightning Map</a>
        <a id="nwsLink" href="#" target="_blank" class="tool-link">📖 NWS Discussion</a>
    </div>
</div>

<script>
    const PIRATE_API_KEY = "p1eTDIbrnfGjCJlwMahUzarQNqzNPyxI";
    const OW_API_KEY = "065942b97acab61c4f876f77d1e71cfb";
    let lat = 41.8781, lon = -87.6298;

    function saveLoc() { localStorage.setItem('weather_hub_lat', lat); localStorage.setItem('weather_hub_lon', lon); }
    function loadLoc() {
        const sLat = localStorage.getItem('weather_hub_lat');
        const sLon = localStorage.getItem('weather_hub_lon');
        if(sLat && sLon) { 
            lat = sLat; lon = sLon;
            document.getElementById('latInput').value = lat;
            document.getElementById('lonInput').value = lon;
        }
    }

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => {
                lat = p.coords.latitude.toFixed(4); lon = p.coords.longitude.toFixed(4);
                document.getElementById('latInput').value = lat;
                document.getElementById('lonInput').value = lon;
                updateLocation();
            });
        }
    }

    function updateLocation() {
        lat = document.getElementById('latInput').value;
        lon = document.getElementById('lonInput').value;
        saveLoc(); loadAll();
    }

    async function loadAll() {
        // Update External Tool Links
        document.getElementById('blitzLink').href = `https://www.blitzortung.org/en/live_lightning_maps.php?lat=${lat}&lon=${lon}&z=8`;
        document.getElementById('nwsLink').href = `https://forecast.weather.gov/MapClick.php?lat=${lat}&lon=${lon}`;
        
        updateRadar();
        fetchNWS();
        fetchPirate();
        fetchOpenWeather();
        fetchAlerts();
    }

    async function fetchAlerts() {
        try {
            const res = await fetch(`https://api.weather.gov/alerts/active?point=${lat},${lon}`);
            const data = await res.json();
            const b = document.getElementById('alerts-banner');
            if (data.features?.length > 0) {
                b.innerText = "⚠️ " + data.features[0].properties.event.toUpperCase();
                b.style.display = "block";
            } else { b.style.display = "none"; }
        } catch(e) {}
    }

    async function fetchNWS() {
        try {
            const p = await (await fetch(`https://api.weather.gov/points/${lat},${lon}`)).json();
            const s = await (await fetch(p.properties.observationStations)).json();
            const o = await (await fetch(`https://api.weather.gov/stations/${s.features[0].properties.stationIdentifier}/observations/latest`)).json();
            document.getElementById('stationName').innerText = "AT " + s.features[0].properties.name.toUpperCase();
            document.getElementById('conditionText').innerText = o.properties.textDescription || "--";
            document.getElementById('weatherIcon').src = o.properties.icon;
            document.getElementById('weatherIcon').style.display = 'block';
            document.getElementById('windVal').innerText = Math.round(o.properties.windSpeed.value * 0.621371 || 0) + " mph";
            document.getElementById('humVal').innerText = Math.round(o.properties.relativeHumidity.value || 0) + "%";
        } catch(e) {}
    }

    async function fetchPirate() {
        try {
            const res = await fetch(`https://api.pirateweather.net/forecast/${PIRATE_API_KEY}/${lat},${lon}?units=us`);
            const d = await res.json();
            let t24 = 0; d.hourly.data.slice(0, 24).forEach(h => t24 += (h.precipIntensity || 0));
            document.getElementById('twentyFourHourTotal').innerText = t24.toFixed(2) + '"';
            document.getElementById('summary').innerText = d.minutely?.summary || "No minute data.";
            const c = document.getElementById('timeline'); c.innerHTML = "";
            let t1 = 0;
            d.minutely?.data.forEach(m => {
                const i = m.precipIntensity || 0; t1 += (i/60);
                const b = document.createElement('div'); b.className = 'bar';
                b.style.height = Math.max(Math.min(i*600, 180), 2) + "px";
                if(i > 0.3) b.style.background = "#ff5252";
                else if(i > 0.1) b.style.background = "#ffd54f";
                else if(i > 0) b.style.background = "#4fc3f7";
                else b.style.background = "rgba(255,255,255,0.1)";
                c.appendChild(b);
            });
            document.getElementById('oneHourTotal').innerText = t1.toFixed(2) + '"';
        } catch(e) {}
    }

    async function fetchOpenWeather() {
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${OW_API_KEY}&units=imperial`);
            const d = await res.json();
            const c = document.getElementById('forecast-container'); c.innerHTML = "";
            
            // Sun Times from first entry
            const sun = d.city;
            document.getElementById('riseVal').innerText = new Date(sun.sunrise * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            document.getElementById('setVal').innerText = new Date(sun.sunset * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            d.list.forEach(i => {
                const date = new Date(i.dt * 1000);
                const card = document.createElement('div'); card.className = 'forecast-card';
                card.innerHTML = `<div style="font-size:0.7em; opacity:0.6">${date.toLocaleDateString([], {weekday:'short'})}</div>
                    <div style="font-weight:bold; color:#ffd54f">${date.getHours() % 12 || 12} ${date.getHours() >= 12 ? 'PM':'AM'}</div>
                    <img class="ow-icon" src="https://openweathermap.org/img/wn/${i.weather[0].icon}.png">
                    <div class="ow-temp">${Math.round(i.main.temp)}&deg;</div>`;
                c.appendChild(card);
            });
        } catch(e) {}
    }

    function updateRadar() {
        document.getElementById('radar-frame').src = `https://www.rainviewer.com/map.html?loc=${lat},${lon},8&oFa=0&oC=1&oU=0&oLL=0&oHu=0&oD=1&oQ=0&oTh=0&color=2&sm=1&sn=1`;
    }

    window.onload = () => { loadLoc(); loadAll(); };
</script>
</body>
</html>
