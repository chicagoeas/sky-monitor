<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minute Forecast</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0b1e2d;
    color: white;
    text-align: center;
    padding: 40px;
}

h1 {
    font-size: 2.5em;
}

#summary {
    font-size: 1.5em;
    margin: 20px 0;
}

#current {
    margin-top: 20px;
    padding: 15px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
}

#current img {
    width: 120px;
    height: auto;
}

#timeline {
    display: flex;
    justify-content: center;
    margin-top: 30px;
}

.bar {
    width: 4px;
    margin: 0 1px;
    background: #4fc3f7;
}

#controls {
    margin-bottom: 20px;
}

#controls input {
    padding: 10px;
    margin: 5px;
    border-radius: 5px;
    border: none;
    background: rgba(255, 255, 255, 0.1);
    color: white;
    font-size: 1em;
}

#controls button {
    padding: 10px 15px;
    border-radius: 5px;
    border: none;
    background: #4fc3f7;
    color: #0b1e2d;
    font-size: 1em;
    font-weight: bold;
    cursor: pointer;
}

#controls button:hover {
    background: #29b6f6;
}
    
</style>

</head>

<body>

<h1>Minute-by-Minute Forecast</h1>
    
<div id="controls">
    <input type="number" id="latInput" value="41.8781" step="0.0001" placeholder="Latitude">
    <input type="number" id="lonInput" value="-87.6298" step="0.0001" placeholder="Longitude">
    <button onclick="updateLocation()">Update Location</button>
</div>
    
<div id="summary">Loading...</div>

<div id="current">
    <h2>Current Conditions</h2>
    <img id="weatherIcon" />
    <div id="conditionText"></div>
</div>

<div id="timeline"></div>

<script>

const API_KEY = "p1eTDIbrnfGjCJlwMahUzarQNqzNPyxI"; // GO RESET THIS LATER!

let lat = 41.8781;
let lon = -87.6298;

let cachedData = null;
let lastFetchTime = 0;
const CACHE_TIME = 120000;

function updateLocation() {
    const newLat = parseFloat(document.getElementById("latInput").value);
    const newLon = parseFloat(document.getElementById("lonInput").value);

    if (isNaN(newLat) || isNaN(newLon)) {
        alert("Please enter valid numbers.");
        return;
    }

    lat = newLat;
    lon = newLon;
    cachedData = null; // Clear cache
    
    document.getElementById("summary").innerText = "Updating...";
    document.getElementById("conditionText").innerText = "Fetching local station...";
    
    loadCurrentConditions();
    fetchWeather();
}

async function loadCurrentConditions() {
    try {
        // Step 1: Get the gridpoint
        const pointRes = await fetch(`https://api.weather.gov/points/${lat},${lon}`);
        if (!pointRes.ok) throw new Error("NWS: Location outside US.");
        const pointData = await pointRes.json();
        
        // Step 2: Get station list
        const stationsUrl = pointData.properties.observationStations;
        const stationsRes = await fetch(stationsUrl);
        const stationsData = await stationsRes.json();
        
        if (!stationsData.features || stationsData.features.length === 0) {
            throw new Error("NWS: No stations found.");
        }
        
        const stationId = stationsData.features[0].properties.stationIdentifier;
        console.log("Using Station:", stationId);

        // Step 3: Get latest observation
        const obsRes = await fetch(`https://api.weather.gov/stations/${stationId}/observations/latest`);
        if (!obsRes.ok) throw new Error("NWS: Station data unavailable.");
        const obsData = await obsRes.json();
        const props = obsData.properties;

        document.getElementById("conditionText").innerText = props.textDescription || "Clear";
        if (props.icon) document.getElementById("weatherIcon").src = props.icon;

    } catch (err) {
        console.error("NWS Error:", err.message);
        document.getElementById("conditionText").innerText = "Conditions: NWS Error (Check Console)";
    }
}

async function fetchWeather() {
    try {
        const response = await fetch(
            `https://api.pirateweather.net/forecast/${API_KEY}/${lat},${lon}?units=us`
        );

        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.message || "Pirate Weather Error");
        }

        const data = await response.json();
        render(data);

    } catch (err) {
        console.error("Pirate Weather Error:", err.message);
        document.getElementById("summary").innerText = "Forecast Error: " + err.message;
    }
}

function render(data) {
    const minutely = data.minutely;

    if (!minutely || !minutely.data) {
        document.getElementById("summary").innerText = "No precipitation expected.";
        document.getElementById("timeline").innerHTML = "";
        return;
    }

    document.getElementById("summary").innerText = minutely.summary;
    const container = document.getElementById("timeline");
    container.innerHTML = "";

    minutely.data.forEach(min => {
        const bar = document.createElement("div");
        bar.className = "bar";
        const height = Math.max((min.precipIntensity || 0) * 200, 2);
        bar.style.height = height + "px";
        
        // Color coding
        if (min.precipProbability > 0.7) bar.style.background = "#ff5252";
        else if (min.precipProbability > 0.3) bar.style.background = "#ffd54f";
        else bar.style.background = "#4fc3f7";

        container.appendChild(bar);
    });
}

function start() {
    loadCurrentConditions();
    fetchWeather();
}

start();
