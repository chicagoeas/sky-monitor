<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minute Forecast</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0b1e2d;
    color: white;
    text-align: center;
    padding: 40px;
}

h1 {
    font-size: 2.5em;
}

#summary {
    font-size: 1.5em;
    margin: 20px 0;
}

#timeline {
    display: flex;
    justify-content: center;
    margin-top: 30px;
}

.bar {
    width: 4px;
    margin: 0 1px;
    background: #4fc3f7;
}

.time-label {
    margin-top: 10px;
    font-size: 0.8em;
}
</style>

</head>

<body>

<h1>Minute-by-Minute Forecast</h1>

<div id="summary">Loading...</div>

<div id="timeline"></div>

<script>
const API_KEY = "p1eTDIbrnfGjCJlwMahUzarQNqzNPyxI";

// Default: Chicago
const lat = 41.8781;
const lon = -87.6298;

async function fetchWeather() {
    try {
        const response = await fetch(
            `https://api.pirateweather.net/forecast/${API_KEY}/${lat},${lon}?units=us`
        );
        const data = await response.json();

        const minutely = data.minutely;

        if (!minutely) {
            document.getElementById("summary").innerText = "No minute data available.";
            return;
        }

        document.getElementById("summary").innerText = minutely.summary;

        drawTimeline(minutely.data);

    } catch (err) {
        document.getElementById("summary").innerText = "Error loading data.";
        console.error(err);
    }
}

function drawTimeline(minutes) {
    const container = document.getElementById("timeline");
    container.innerHTML = "";

    minutes.forEach(min => {
        const bar = document.createElement("div");
        bar.className = "bar";

        // Scale intensity (adjust multiplier as needed)
        const height = Math.max(min.precipIntensity * 200, 2);
        bar.style.height = height + "px";

        // Color coding
        if (min.precipProbability > 0.7) {
            bar.style.background = "#ff5252"; // heavy
        } else if (min.precipProbability > 0.3) {
            bar.style.background = "#ffd54f"; // moderate
        } else {
            bar.style.background = "#4fc3f7"; // light
        }

        container.appendChild(bar);
    });
}

fetchWeather();

// Refresh every 3 minutes (safe for API limits)
setInterval(fetchWeather, 180000);
</script>

</body>
</html>
