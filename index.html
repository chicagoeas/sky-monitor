<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaddleWeather | v1.3 Professional Station</title>
    <style>
        /* --- ALL PREVIOUS STYLES RETAINED --- */
        :root { --primary: #4fc3f7; --accent: #ffd54f; --danger: #ff1744; --warning: #ffeb3b; --success: #00e676; --bg: #07131d; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(180deg, var(--bg) 0%, #112233 100%); background-attachment: fixed; color: white; margin: 0; padding: 20px 20px 100px 20px; transition: background 1s ease; }
        
        /* THEMES */
        body.theme-tor { background: linear-gradient(180deg, #3a0000 0%, #0a0000 100%); }
        body.theme-svr { background: linear-gradient(180deg, #1a0033 0%, #050011 100%); animation: lightning 7s infinite; }
        body.theme-ffw { background: linear-gradient(180deg, #002211 0%, #000a05 100%); }
        @keyframes lightning { 0%, 95%, 98%, 100% { background-color: transparent; } 96%, 99% { background-color: rgba(255, 255, 255, 0.1); } }

        #dashboard { max-width: 850px; margin: auto; background: rgba(255, 255, 255, 0.03); padding: 30px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); }
        #alert-banner { display: none; background: var(--danger); color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; font-weight: bold; cursor: pointer; text-align: center; }
        #safety-checklist { display: none; background: #000; color: #fff; border: 2px solid var(--danger); padding: 20px; border-radius: 15px; font-size: 1.5em; font-weight: 900; text-align: center; margin-top: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 23, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 23, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 23, 68, 0); } }

        .detail-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 25px 0; }
        .detail-item { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .detail-label { font-size: 0.7em; opacity: 0.5; text-transform: uppercase; margin-bottom: 5px; }
        .detail-val { font-size: 1.1em; font-weight: bold; color: var(--accent); }

        .chart-frame { display: flex; height: 150px; margin-top: 15px; position: relative; }
        #timeline { flex-grow: 1; display: flex; align-items: flex-end; gap: 2px; border-bottom: 1px solid #444; border-left: 1px solid #444; height: 100%; }
        .bar { flex: 1; min-height: 2px; border-radius: 1px 1px 0 0; transition: height 0.5s; }

        .toolkit-box { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .toolkit-header { font-weight: bold; color: var(--primary); font-size: 0.9em; margin-bottom: 10px; display: flex; justify-content: space-between; }
        
        #orbit-container { position: relative; height: 120px; width: 100%; margin: 20px 0; border-bottom: 2px solid #444; overflow: hidden; }
        .orbit-arc { position: absolute; bottom: 0; left: 10%; right: 10%; height: 200%; border: 2px dashed rgba(255,255,255,0.1); border-radius: 50%; }
        #celestial-body { position: absolute; width: 20px; height: 20px; border-radius: 50%; transform: translate(-50%, 50%); transition: 1s ease-out; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0b1e2d; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav-item { color: #888; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 1.1em; }
        .nav-item.active { color: var(--primary); }
        .nav-item span { font-size: 0.5em; text-transform: uppercase; margin-top: 4px; }
    </style>
</head>
<body>

    <h1>WaddleWeather <span id="sync-indicator" style="font-size:0.3em; color:var(--success); vertical-align: middle; opacity: 0.5;">● LIVE</span></h1>
    
    <div id="coords-panel" style="margin-bottom:20px;">
        <input type="number" id="latInput" value="41.8781" step="0.0001">
        <input type="number" id="lonInput" value="-87.6298" step="0.0001">
        <button class="btn-action" onclick="updateLocation()" style="background:var(--primary); padding:5px 15px; border-radius:10px; border:none; cursor:pointer;">SYNC</button>
    </div>

<div id="dashboard">
    <div id="home-tab" class="tab-content active">
        <div id="alert-banner" onclick="switchTab('severe', document.getElementById('nav-severe'))">⚠️ ALERTS ACTIVE</div>
        <div id="stationName" style="color: #888; font-size: 0.7em; margin-bottom: 10px;">INITIALIZING...</div>
        <div style="display: flex; align-items: center; justify-content: center; gap: 20px;">
            <img id="weatherIcon" src="" style="display:none; width: 70px;">
            <div id="conditionText" style="font-size: 2em; font-weight: 300;">--</div>
        </div>
        <div class="detail-grid">
            <div class="detail-item"><div class="detail-label">Wind</div><div id="windVal" class="detail-val">--</div></div>
            <div class="detail-item"><div class="detail-label">Humidity</div><div id="humVal" class="detail-val">--</div></div>
            <div class="detail-item"><div class="detail-label">Sunrise</div><div id="riseVal" class="detail-val">--</div></div>
            <div class="detail-item"><div class="detail-label">Sunset</div><div id="setVal" class="detail-val">--</div></div>
        </div>
        <div id="minuteSummary" style="color: var(--accent); margin-bottom: 10px; font-weight:bold;">--</div>
        <div class="chart-frame"><div id="timeline"></div></div>
        <div id="forecast-container" style="display:flex; overflow-x:auto; gap:10px; margin-top:20px;"></div>
    </div>

    <div id="severe-tab" class="tab-content">
        <div id="alert-stack" style="margin-bottom:20px;"></div>
        <div class="toolkit-box">
            <div class="toolkit-header">⚡ EST. LIGHTNING DENSITY <span id="lightning-count" style="color:var(--warning); font-size:1.5em;">0</span></div>
        </div>
        <iframe id="radar-frame" width="100%" height="400" frameborder="0" style="border-radius:15px; background:#000; margin-bottom:20px;"></iframe>
        <div class="toolkit-header">SPC DAY 1 OUTLOOK</div>
        <a id="spc-link" target="_blank" title="Click to view full size">
            <img id="spc-map" style="width:100%; border-radius:15px; border:1px solid #333; margin-bottom:20px;">
        </a>
        <div id="safety-checklist"></div>
    </div>

    <div id="details-tab" class="tab-content">
        <div class="toolkit-box">
            <div class="toolkit-header">CELESTIAL ORBIT</div>
            <div id="orbit-container"><div class="orbit-arc"></div><div id="celestial-body"></div></div>
        </div>
        <div class="toolkit-box">
            <div class="toolkit-header">LOCAL CLIMATE REPORT (ALMANAC)</div>
            <div id="cli-text" style="font-family:monospace; font-size:0.75em; color:#aeea00; white-space:pre-wrap; height:300px; overflow-y:auto; background:rgba(0,0,0,0.3); padding:10px; border-radius:10px;">Fetching local climate data...</div>
        </div>
        <div id="wfo-label" style="font-size:0.7em; color:var(--primary); margin-bottom:5px;">OFFICE: --</div>
        <div id="nws-text" style="background:rgba(0,0,0,0.4); padding:15px; border-radius:15px; font-family:monospace; font-size:0.8em; color:#aeea00; height:400px; overflow-y:auto;">Fetching Discussion...</div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" id="nav-home" onclick="switchTab('home', this)">🏠<span>Home</span></div>
    <div class="nav-item" id="nav-severe" onclick="switchTab('severe', this)">⚠️<span>Severe</span></div>
    <div class="nav-item" id="nav-details" onclick="switchTab('details', this)">📖<span>Dive</span></div>
</div>

<script>
    const PIRATE_API_KEY = "p1eTDIbrnfGjCJlwMahUzarQNqzNPyxI";
    const OW_API_KEY = "065942b97acab61c4f876f77d1e71cfb";
    let lat = 41.8781, lon = -87.6298;
    let localRiseTime = 0, localSetTime = 0;

    // --- ALERT ICON MAP (ADD NEW ONES HERE!) ---
    const ALERT_ICONS = {
        "tornado warning": "https://forecast.weather.gov/newimages/medium/tor.png",
        "tornado watch": "https://forecast.weather.gov/newimages/medium/tor.png",
        "severe thunderstorm warning": "https://forecast.weather.gov/newimages/large/tsra.png",
        "severe thunderstorm watch": "https://forecast.weather.gov/newimages/large/tsra.png",
        "flash flood warning": "https://forecast.weather.gov/newimages/medium/ffg.png",
        "flood warning": "https://forecast.weather.gov/newimages/medium/ffg.png",
        "flood watch": "https://forecast.weather.gov/newimages/medium/ffg.png",
        "heat advisory": "https://forecast.weather.gov/newimages/medium/hi.png",
        "winter storm warning": "https://forecast.weather.gov/newimages/medium/isold_sn.png"
    };

    function switchTab(tabId, element) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(tabId + '-tab').classList.add('active');
        element.classList.add('active');
        if(tabId === 'details') drawOrbit();
    }

    async function loadAll() {
        // Visual Sync Indicator
        const indicator = document.getElementById('sync-indicator');
        indicator.style.opacity = "1";
        
        document.getElementById('radar-frame').src = `https://www.rainviewer.com/map.html?loc=${lat},${lon},8&oFa=0&oC=1&oU=0&oLL=0&oHu=0&oD=1&oQ=0&oTh=0&color=2&sm=1&sn=1`;
        
        // Robust SPC Map Fetch
        const spcMap = document.getElementById('spc-map');
        const spcUrl = "https://www.spc.noaa.gov/products/outlook/day1otlk.png";
        spcMap.src = `https://api.allorigins.win/raw?url=${encodeURIComponent(spcUrl)}&t=${new Date().getTime()}`;
        document.getElementById('spc-link').href = spcUrl;

        fetchAlerts(); fetchPirate(); fetchOpenWeather(); fetchNWSChain();
        
        setTimeout(() => { indicator.style.opacity = "0.5"; }, 2000);
    }

    async function fetchAlerts() {
        const stack = document.getElementById('alert-stack');
        const banner = document.getElementById('alert-banner');
        const checklist = document.getElementById('safety-checklist');
        
        try {
            const res = await fetch(`https://api.weather.gov/alerts/active?point=${lat},${lon}`);
            const data = await res.json();
            stack.innerHTML = "";
            document.body.className = "";
            checklist.style.display = "none";

            if (data.features?.length > 0) {
                banner.style.display = "block";
                banner.innerText = `⚠️ ${data.features[0].properties.event.toUpperCase()}`;
                
                let highestTheme = "";
                let checklistText = "";

                data.features.forEach(f => {
                    const p = f.properties;
                    const evt = p.event.toLowerCase();
                    
                    // Icon logic using the new Map
                    let icon = "https://forecast.weather.gov/newimages/medium/nshra.png";
                    for (const key in ALERT_ICONS) {
                        if (evt.includes(key)) { icon = ALERT_ICONS[key]; break; }
                    }

                    if(evt.includes("tornado warning")) { highestTheme = "theme-tor"; checklistText = "TAKE COVER NOW!"; }
                    else if(evt.includes("severe thunderstorm") && highestTheme !== "theme-tor") { highestTheme = "theme-svr"; checklistText = "MOVE TO AN INTERIOR ROOM!"; }
                    else if(evt.includes("flash flood warning") && !highestTheme) { highestTheme = "theme-ffw"; checklistText = "SEEK HIGHER GROUND NOW!"; }

                    stack.innerHTML += `
                        <div class="alert-card" style="display:flex; align-items:center; gap:15px; background:${p.severity==='Extreme'?'#b71c1c':'#e65100'}; padding:15px; border-radius:12px; margin-bottom:10px;">
                            <img src="${icon}" style="width:50px; border-radius:5px;">
                            <div><b>${p.event}</b><br><small>${p.headline || ''}</small></div>
                        </div>`;
                });

                if(highestTheme) document.body.className = highestTheme;
                if(checklistText) { checklist.innerText = checklistText; checklist.style.display = "block"; }
            } else { banner.style.display = "none"; }
        } catch(e) {}
    }

    async function fetchNWSChain() {
        try {
            const p = await (await fetch(`https://api.weather.gov/points/${lat},${lon}`)).json();
            const wfo = p.properties.cwa;
            document.getElementById('wfo-label').innerText = "OFFICE: " + wfo;
            
            // CLI (Climate Report) Fetch
            const cliList = await (await fetch(`https://api.weather.gov/products/types/CLI/locations/${wfo}`)).json();
            if(cliList['@graph']?.length > 0) {
                const cliData = await (await fetch(cliList['@graph'][0]['@id'])).json();
                document.getElementById('cli-text').innerText = cliData.productText;
            }

            const stations = await (await fetch(p.properties.observationStations)).json();
            const obs = await (await fetch(`${stations.features[0].id}/observations/latest`)).json();
            document.getElementById('stationName').innerText = stations.features[0].properties.name;
            document.getElementById('conditionText').innerText = obs.properties.textDescription || "--";
            document.getElementById('weatherIcon').src = obs.properties.icon;
            document.getElementById('weatherIcon').style.display = "block";
            document.getElementById('windVal').innerText = Math.round(obs.properties.windSpeed.value * 0.621) + " mph";
            document.getElementById('humVal').innerText = Math.round(obs.properties.relativeHumidity.value) + "%";
            
            const afdList = await (await fetch(`https://api.weather.gov/products/types/AFD/locations/${wfo}`)).json();
            const afd = await (await fetch(afdList['@graph'][0]['@id'])).json();
            document.getElementById('nws-text').innerText = afd.productText;
        } catch(e) {}
    }

    async function fetchPirate() {
        try {
            const res = await fetch(`https://api.pirateweather.net/forecast/${PIRATE_API_KEY}/${lat},${lon}?units=us`);
            const d = await res.json();
            document.getElementById('minuteSummary').innerText = d.minutely?.summary || "Holding Steady.";
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = "";
            let maxIntensity = 0;
            d.minutely?.data.forEach(m => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                const intensity = m.precipIntensity || 0;
                if(intensity > maxIntensity) maxIntensity = intensity;
                bar.style.height = Math.max(Math.min((intensity / 0.4) * 100, 100), 2) + "%";
                if(intensity >= 0.3) bar.style.background = "#ff1744"; 
                else if(intensity >= 0.1) bar.style.background = "#ffeb3b";
                else if(intensity > 0) bar.style.background = "#00e676";
                else bar.style.background = "rgba(255,255,255,0.05)";
                timeline.appendChild(bar);
            });
            document.getElementById('lightning-count').innerText = maxIntensity > 0.1 ? Math.floor(maxIntensity * 100) : 0;
        } catch(e) {}
    }

    async function fetchOpenWeather() {
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${OW_API_KEY}&units=imperial`);
            const d = await res.json();
            localRiseTime = d.city.sunrise * 1000; localSetTime = d.city.sunset * 1000;
            document.getElementById('riseVal').innerText = new Date(localRiseTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.getElementById('setVal').innerText = new Date(localSetTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            const cont = document.getElementById('forecast-container');
            cont.innerHTML = "";
            d.list.slice(0, 10).forEach(f => {
                cont.innerHTML += `<div style="background:rgba(0,0,0,0.3); padding:10px; border-radius:10px; min-width:80px; text-align:center;">
                    <div style="font-size:0.6em; color:var(--primary);">${new Date(f.dt*1000).toLocaleTimeString([], {hour:'numeric'})}</div>
                    <img src="https://openweathermap.org/img/wn/${f.weather[0].icon}.png" style="width:30px;">
                    <div style="font-weight:bold;">${Math.round(f.main.temp)}&deg;</div>
                </div>`;
            });
            drawOrbit();
        } catch(e) {}
    }

    function drawOrbit() {
        if(!localRiseTime) return;
        const now = new Date().getTime();
        const body = document.getElementById('celestial-body');
        let isDay = (now > localRiseTime && now < localSetTime);
        let pct = isDay ? (now - localRiseTime) / (localSetTime - localRiseTime) : 0.5; // Simplistic
        body.style.background = isDay ? "#ffd54f" : "#eee";
        body.style.left = (10 + (Math.max(0, Math.min(1, pct)) * 80)) + "%";
        body.style.top = (100 - (Math.sin(pct * Math.PI) * 100)) + "%";
    }

    function updateLocation() { lat = document.getElementById('latInput').value; lon = document.getElementById('lonInput').value; localStorage.setItem('waddle_lat', lat); localStorage.setItem('waddle_lon', lon); loadAll(); }
    
    // AUTO-REFRESH EVERY 5 MINUTES
    setInterval(loadAll, 300000);

    window.onload = () => {
        const sLat = localStorage.getItem('waddle_lat');
        if(sLat) { lat = sLat; lon = localStorage.getItem('waddle_lon'); document.getElementById('latInput').value = lat; document.getElementById('lonInput').value = lon; }
        loadAll();
    };
</script>
</body>
</html>
